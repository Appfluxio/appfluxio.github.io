<div id="loaderArea">
        <div class="loader"></div> <span style="color: #888;">Checking app...</span>
    </div>
    <a id="openBtn" href="housie://join" class="btn">OPEN MANUALLY</a>
    
    <div id="status">Connecting to game...</div>
    
    <p style="margin-top: 50px; color: #999; font-size: 0.8em;">
        If the app isn't installed, you will be redirected to the Store automatically.
    </p>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const playStoreUrl = "https://play.google.com/store/apps/details?id=com.applaytechHousie";
    const appStoreUrl = "https://apps.apple.com/app/idYOUR_APP_ID"; // Replace with your real ID later
    
    function getStoreUrl() {
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        if (/android/i.test(userAgent)) return playStoreUrl;
        if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) return appStoreUrl;
        return playStoreUrl; // Default
    }
    if (code) {
        const deepLink = `housie://join?code=${code}`;
        document.getElementById('openBtn').href = deepLink;
        // Try to open the app
        window.location.href = deepLink;
        // Fallback Logic:
        // If the user is still on this page after 2.5 seconds, redirect to Store
        setTimeout(function() {
            if (!document.hidden) {
                document.getElementById('status').innerText = "App not found. Redirecting to Store...";
                setTimeout(() => {
                    window.location.href = getStoreUrl();
                }, 1000);
            }
        }, 2500);
    } else {
        document.getElementById('status').innerText = "Waiting for game code...";
        document.getElementById('loaderArea').style.display = 'none';
    }
</script>
