<!DOCTYPE html>
<html>
<head>
    <title>Housie Classic - Join Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; background: #f4f4f4; text-align: center; padding: 20px; 
        }
        .btn { 
            background: #f98113; color: white; padding: 16px 32px; text-decoration: none; 
            border-radius: 30px; font-weight: bold; margin-top: 20px; 
            box-shadow: 0 4px 15px rgba(249, 129, 19, 0.3); display: inline-block; 
            font-size: 1.1em;
        }
        h1 { color: #333; margin-bottom: 10px; }
        p { color: #666; line-height: 1.5; max-width: 300px; }
    </style>
</head>
<body>
    <h1>Housie Classic</h1>
    <p>If the app didn't open automatically, tap the button below to join the game.</p>
    
    <!-- This button link will be updated automatically by the script below -->
    <a id="openBtn" href="housie://join" class="btn">OPEN IN APP</a>
    
    <p style="margin-top: 40px; color: #999; font-size: 0.85em;">
        Don't have the app? <br>Download it from the Play Store or App Store.
    </p>

    <script>
        // 1. Get the 'code' from the URL (e.g., ?code=XYZ123)
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        
        if (code) {
            const btn = document.getElementById('openBtn');
            const deepLink = `housie://join?code=${code}`;
            
            // 2. Update the button to include the specific game code
            btn.href = deepLink;
            
            // 3. Try to auto-open the app after a tiny delay
            setTimeout(() => {
                window.location.href = deepLink;
            }, 500);
        }
    </script>
</body>
</html>
