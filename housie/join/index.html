<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Opening Housie…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #7b2ff7, #00c6ff);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(14px);
      border-radius: 22px;
      padding: 36px 28px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 45px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 26px;
      font-weight: 700;
    }

    p {
      margin: 0 0 22px;
      opacity: 0.9;
      font-size: 15px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .badge {
      width: 180px;
      margin: 10px auto;
      display: block;
      transition: transform 0.15s ease;
    }

    .badge:hover {
      transform: scale(1.05);
    }

    .hint {
      font-size: 13px;
      opacity: 0.75;
      margin-top: 14px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Opening Housie…</h1>
    <p>If nothing happens, install it below</p>

    <div class="spinner"></div>

    <!-- iOS -->
    <a id="iosLink" href="#" style="display:none;">
      <img class="badge"
        src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg"
        alt="Download on App Store">
    </a>

    <!-- Android -->
    <a id="androidLink" href="#" style="display:none;">
      <img class="badge"
        src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg"
        alt="Get it on Google Play">
    </a>

    <div class="hint">Having trouble? Tap your store above 👆</div>
  </div>

<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code") || "";

  const playStoreUrl =
    "https://play.google.com/store/apps/details?id=com.applaytechHousie";

  const appStoreUrl =
    "https://apps.apple.com/app/idYOUR_IOS_APP_ID"; // replace when ready

  const webLink =
    `https://arunsharda.github.io/housie/join?code=${encodeURIComponent(code)}`;

  const androidIntent =
    `intent://join?code=${encodeURIComponent(code)}` +
    `#Intent;scheme=housie;package=com.applaytechHousie;` +
    `S.browser_fallback_url=${encodeURIComponent(playStoreUrl)};end`;

  const ua = navigator.userAgent || navigator.vendor || window.opera;
  const isAndroid = /android/i.test(ua);
  const isIOS = /iPad|iPhone|iPod/.test(ua);

  const iosBtn = document.getElementById("iosLink");
  const androidBtn = document.getElementById("androidLink");

  iosBtn.href = appStoreUrl;
  androidBtn.href = playStoreUrl;

  if (isIOS) {
    iosBtn.style.display = "block";
    // iOS: Universal Link attempt
    window.location.href = webLink;
  } else if (isAndroid) {
    androidBtn.style.display = "block";
    // Android: Intent link (opens app or Play Store automatically)
    window.location.href = androidIntent;
  } else {
    // Desktop fallback
    iosBtn.style.display = "block";
    androidBtn.style.display = "block";
  }
})();
</script>

</body>
</html>
