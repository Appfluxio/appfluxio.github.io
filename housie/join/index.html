<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Housie</title>
  <meta name="description" content="Join your Housie game instantly. Open the app or download it in one tap." />

  <style>
    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1f2937, #020617);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(14px);
      border-radius: 24px;
      padding: 32px 26px 28px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,.4);
    }

    .logo {
      width: 84px;
      height: 84px;
      border-radius: 20px;
      margin-bottom: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,.4);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 700;
    }

    #desc {
      font-size: 15px;
      opacity: 0.85;
      margin-bottom: 22px;
    }

    .main-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 52px;
      width: 100%;
      border-radius: 14px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      margin-bottom: 20px;
      box-shadow: 0 10px 25px rgba(34,197,94,.4);
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .main-btn:active {
      transform: scale(.97);
      box-shadow: 0 6px 18px rgba(34,197,94,.3);
    }

    .loading-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,.2);
      border-top-color: #fff;
      animation: spin .9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 13px;
      opacity: .8;
    }

    .store-section {
      display: none;
      margin-top: 18px;
    }

    .store-title {
      font-size: 14px;
      opacity: .85;
      margin-bottom: 12px;
    }

    .badge-grid {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .badge-img {
      height: 48px;
      transition: transform .15s ease;
    }

    .badge-img:hover {
      transform: scale(1.04);
    }

    .footer {
      margin-top: 22px;
      font-size: 11px;
      opacity: .6;
    }
  </style>
</head>
<body>

<div class="card">
  <img class="logo" src="https://dummyimage.com/160x160/22c55e/ffffff&text=H" alt="Housie" />
  <h1>Opening Housie…</h1>
  <p id="desc">Hang tight while we connect you to your game.</p>

  <a id="openBtn" href="#" class="main-btn">OPEN IN HOUSIE</a>

  <div class="loading-area" id="loader">
    <div class="spinner"></div>
    <div class="loading-text">Verifying app…</div>
  </div>

  <div class="store-section" id="store">
    <div class="store-title">App not installed?</div>
    <div class="badge-grid">
      <a id="play-store" href="#" target="_blank" rel="noopener">
        <img class="badge-img"
             src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg"
             alt="Get it on Google Play">
      </a>

      <a id="app-store" href="#" target="_blank" rel="noopener">
        <img class="badge-img"
             src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg"
             alt="Download on the App Store">
      </a>
    </div>
  </div>

  <div class="footer">
    Professional Tambola & Bingo Experience
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const code = params.get("code");

const androidPackage = "com.applaytechHousie";
const playStoreUrl = `https://play.google.com/store/apps/details?id=${androidPackage}`;
const appStoreUrl  = "http://housie.applaytech.com/"; // replace with real ID

const openBtn = document.getElementById("openBtn");
const loader = document.getElementById("loader");
const store = document.getElementById("store");
const desc = document.getElementById("desc");

function showStore() {
  loader.style.display = "none";
  store.style.display = "block";
  desc.textContent = "Looks like you don’t have the app yet.";

  const ua = navigator.userAgent || navigator.vendor || window.opera;
  const isAndroid = /android/i.test(ua);
  const isiOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;

  if (isAndroid) {
    document.getElementById("play-store").href = playStoreUrl;
    document.getElementById("app-store").style.display = "none";
  } else if (isiOS) {
    document.getElementById("app-store").href = appStoreUrl;
    document.getElementById("play-store").style.display = "none";
  } else {
    document.getElementById("play-store").href = playStoreUrl;
    document.getElementById("app-store").href = appStoreUrl;
  }
}

// Attempt to open app automatically on page load
window.addEventListener("load", () => {
  if (!code) {
    desc.textContent = "Invalid link. Please request a new invite.";
    loader.style.display = "none";
    return;
  }

  const deepLink = `housie://join?code=${encodeURIComponent(code)}`;
  const ua = navigator.userAgent || navigator.vendor || window.opera;
  const isAndroid = /android/i.test(ua);
  const isiOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;

  if (isiOS) {
    // iOS: automatic deep link
    const start = Date.now();
    window.location = deepLink;

    // Fallback to App Store after 2s if app not installed
    setTimeout(() => {
      if (Date.now() - start < 2500) {
        showStore();
      }
    }, 2000);

  } else if (isAndroid) {
    // Android Chrome: use intent URL
    // const intentLink = `intent://join?code=${encodeURIComponent(code)}#Intent;scheme=housie;package=${androidPackage};end`;
    // const start = Date.now();
    // window.location = intentLink;

     const intentLink = `intent://join/?code=${encodeURIComponent(code)}#Intent;scheme=housie;package=${androidPackage};end;`;

     const start = Date.now();
    // Optional: Log it for debugging if you want
    console.log("Opening Intent:", intentLink);
    
    window.location = intentLink;

    // Fallback to Play Store after 2s
    setTimeout(() => {
      if (Date.now() - start < 2500) {
        showStore();
      }
    }, 2000);

  } else {
    // Desktop
    showStore();
  }
});

// Optional: still allow user click to retry
openBtn.addEventListener("click", () => {
  window.location.reload();
});
</script>

</body>
</html>
