
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Housie & Claim Bonus Coins!</title>
    
    <!-- Meta tags for rich previews on social media (WhatsApp, Meta Ads, etc.) -->
    <meta property="og:title" content="Join Housie & Get 100 Bonus Coins! 🎁">
    <meta property="og:description" content="Play Tambola/Housie with friends. Install now to claim your free coins.">
    <meta property="og:image" content="https://appfluxio.github.io/housie/join/housie_premium_bg.png">
    <meta property="og:type" content="website">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #131110;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border-left-color: #F98113;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 { font-size: 20px; margin-bottom: 8px; font-weight: 700; }
        p { color: #aaaaaa; font-size: 14px; margin-top: 0; }
    </style>

    <script type="text/javascript">
        window.onload = function() {
            // 1. Parse the referral code ('ref') from URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref') || '';

            // 2. Define App Package Name & Store Link Details
            const androidPackage = "com.applaytechHousie"; // Matches your android applicationId
            const appStoreId = "id6475654321"; // Replace with your actual iOS App Store ID once published

            // 3. Construct deep links and fallbacks
            const playStoreUrl = "https://play.google.com/store/apps/details?id=" + androidPackage + "&referrer=utm_source%3Dreferral%26utm_content%3D" + ref;
            const appStoreUrl = "https://apps.apple.com/app/" + appStoreId;
            
            // Standard universal/intent links
            const androidIntent = "intent://appfluxio.github.io/housie/refer?ref=" + ref + "#Intent;scheme=https;package=" + androidPackage + ";end";
            const iosDeepLink = "housie://refer?ref=" + ref;

            // 4. Platform detection
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const isAndroid = /android/i.test(userAgent);
            const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;

            if (isAndroid) {
                // Try to open the app directly using Android Intent Link
                window.location.replace(androidIntent);
                // Fallback to Play Store with referrer attribution parameters if not installed
                setTimeout(() => {
                    window.location.replace(playStoreUrl);
                }, 2000);
            } else if (isIOS) {
                // Try to open the app via custom scheme
                window.location.replace(iosDeepLink);
                // Fallback to App Store after delay
                setTimeout(() => {
                    window.location.replace(appStoreUrl);
                }, 2000);
            } else {
                // Desktop or other platform fallback
                window.location.replace(playStoreUrl);
            }
        };
    </script>
</head>
<body>
    <div class="spinner"></div>
    <h1>Opening Housie...</h1>
    <p>Please wait while we redirect you to the game.</p>
</body>
</html>
