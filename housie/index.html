
<!DOCTYPE html>
<html>
<head>
    <title>Housie Classic - Join Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            background: linear-gradient(135deg, #fdfbf7 0%, #f5efe6 100%); 
            text-align: center; 
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            max-width: 480px;
            background: white;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 { 
            color: #2c2c2c; 
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 800;
        }
        p {
            color: #666;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .btn { 
            display: inline-block;
            background: #f98113; 
            color: white; 
            padding: 16px 40px; 
            text-decoration: none; 
            border-radius: 30px; 
            font-weight: bold; 
            font-size: 16px;
            box-shadow: 0 6px 20px rgba(249, 129, 19, 0.3); 
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(249, 129, 19, 0.4); 
        }
        .divider {
            margin: 40px 0 24px 0;
            border: 0;
            border-top: 1px solid #eee;
            position: relative;
        }
        .divider::after {
            content: "OR DOWNLOAD THE APP";
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 0 12px;
            color: #999;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .store-badges {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 16px;
        }
        .store-btn img {
            height: 44px;
            transition: transform 0.2s;
        }
        .store-btn:hover img {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Housie Classic</h1>
        <p>Tambola Bingo with Friends</p>
        
        <p>If you already have the app installed, tap below to open and join automatically:</p>
        <a href="housie-classic.app://join" class="btn">OPEN IN APP</a>
        
        <hr class="divider">
        
        <p style="font-size: 14px; margin-bottom: 16px; color: #888;">Select your store to install the game:</p>
        <div class="store-badges">
            <!-- Google Play Store -->
            <a href="https://play.google.com/store/apps/details?id=com.applaytechHousie" class="store-btn" target="_blank">
                <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" alt="Get it on Google Play">
            </a>
            
            <!-- Apple App Store -->
            <a href="https://apps.apple.com/app/id" class="store-btn" target="_blank">
                <img src="https://developer.apple.com/app-store/marketing/guidelines/images/badge-download-on-the-app-store.svg" alt="Download on the App Store" style="padding: 5px 0; height: 34px;">
            </a>
        </div>
    </div>
</body>
</html>
